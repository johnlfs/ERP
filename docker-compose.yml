services:
  postgres:
    image: postgres:17-alpine
    container_name: erp-retailflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: retailflow
      POSTGRES_PASSWORD: retailflow123
      POSTGRES_DB: retailflow_db
    ports:
      - "5434:5432"
    volumes:
      - retailflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retailflow -d retailflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: erp-retailflow-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - retailflow_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  retailflow_postgres_data:
  retailflow_redis_data:
